<!DOCTYPE html>
<html>
<head>
    <title>William's Gym Tracker</title>
    <style>
        body { font-family: sans-serif; margin: 40px; line-height: 1.6; }
        form { margin-bottom: 20px; padding: 20px; border: 1px solid #ddd; }
        input { margin-bottom: 10px; display: block; padding: 8px; }
    </style>
</head>
<body>
    <h1>Gym Progress Tracker</h1>
    
    <form action="/add" method="POST">
        <label>Machine/Exercise:</label>
        <input type="text" name="exercise" placeholder="e.g. Leg Press" required>
        
        <label>Weight (lbs):</label>
        <input type="number" name="weight" placeholder="50" required>
        
        <label>Reps:</label>
        <input type="number" name="reps" placeholder="12" required>
        
        <button type="submit">Log Workout</button>
    </form>

    <h2>Recent Workouts</h2>
    <ul>
        {% for workout in workouts %}
            <li>{{ workout }}</li>
        {% endfor %}
    </ul>
</body>
</html>
