{% extends "layout.html" %}

{% block title %}Home{% endblock %}

{% block content %}
    <h1>Welcome {{name}}</h1>
    <div class = "workout-form">
        <h1>Log Workout</h1>
        <form action="/add_workout" method="POST">
        <label for="workout_name">Pick a Workout:</label>
        <select name="workout_name" id="workout_name" required>
            {% for workout in workout_options %}
                <option value="{{ workout }}">{{ workout }}</option>
            {% endfor %}
        </select>
        <input type="number" name="sets" placeholder="Sets" required>
        <input type="number" name="reps" placeholder="Reps" required>
        <input type="number" name="weight" placeholder="Lbs" required>
        <button type="submit">Log Workout</button>
        </form>
    </div>
{% endblock %}
